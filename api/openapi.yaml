openapi: 3.0.3
info:
  title: VRChat Join Manager API
  version: 1.0.0
  description: VRChat Join Manager API
servers:
  - url: /
tags:
  - name: analytics
  - name: events
  - name: groups
  - name: instances
  - name: players
  - name: worlds

paths:
  /api/analytics/daily-active-users:
    get:
      operationId: getDailyActiveUsers
      tags: [analytics]
      parameters:
        - $ref: '#/components/parameters/WorldIdQuery'
        - $ref: '#/components/parameters/GroupIdQuery'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
      responses:
        '200':
          description: 日次アクティブユーザー
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyActiveUsersPoint'

  /api/analytics/hourly-active-users:
    get:
      operationId: getHourlyActiveUsers
      tags: [analytics]
      parameters:
        - $ref: '#/components/parameters/WorldIdQuery'
        - $ref: '#/components/parameters/GroupIdQuery'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
      responses:
        '200':
          description: 時間別アクティブユーザー
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HourlyActiveUsersPoint'

  /api/analytics/join-violation-rankings:
    get:
      operationId: getJoinViolationRankings
      tags: [analytics]
      parameters:
        - name: group_id
          in: query
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - name: allow_diff
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: min_duration
          in: query
          schema: { type: integer, minimum: 0, nullable: true }
        - name: rejoin_seconds
          in: query
          schema: { type: integer, minimum: 0, default: 180 }
        - name: grace_seconds
          in: query
          schema: { type: integer, minimum: 0, default: 900 }
      responses:
        '200':
          description: 違反回数ランキング
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JoinViolationRankOut'

  /api/analytics/player-rankings:
    get:
      operationId: getPlayerRankings
      tags: [analytics]
      parameters:
        - $ref: '#/components/parameters/WorldIdQuery'
        - $ref: '#/components/parameters/GroupIdQuery'
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: 滞在時間ランキング
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerRankOut'

  /api/events:
    post:
      operationId: receiveEvent
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerEvent'
      responses:
        '200':
          description: OK

  /api/groups:
    get:
      operationId: listGroups
      tags: [groups]
      parameters:
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: グループ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupOut'

  /api/groups/{group_id}:
    parameters:
      - name: group_id
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: renameGroup
      tags: [groups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupRenameIn'
      responses:
        '204':
          description: 名前を更新
        '404':
          description: 見つからない
    delete:
      operationId: deleteGroup
      tags: [groups]
      responses:
        '204':
          description: 削除
        '404':
          description: 見つからない

  /api/locations/{location_id}/close:
    parameters:
      - $ref: '#/components/parameters/LocationIdPath'
    post:
      operationId: closeLocation
      tags: [instances]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseLocationIn'
      responses:
        '204':
          description: クローズ
        '404':
          description: オープン中のインスタンスがない

  /api/locations/{location_id}/checkin:
    parameters:
      - $ref: '#/components/parameters/LocationIdPath'
    post:
      operationId: checkinLocation
      tags: [instances]
      description: |
        インスタンス参加時の同一性判定。観測名簿をもとに、直近にクローズした
        同一 location_id のインスタンスへの復帰かをサーバーが判定し、
        復帰なら該当セッションを復元して復元済み user_id を返す。
        復元されなかった在室者は呼び出し側が join として送信すること。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckinIn'
      responses:
        '200':
          description: 判定結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckinOut'

  /api/instances:
    get:
      operationId: listInstances
      tags: [instances]
      description: |
        インスタンス一覧。`start`/`end` を指定した場合は、インスタンスのオープン期間
        `[opened_at, closed_at)` が `[start, end]` と重なるものを返す
        (closed_at が NULL の進行中インスタンスは end の制約のみで判定)。
      parameters:
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - name: is_open
          in: query
          schema: { type: boolean, nullable: true }
        - $ref: '#/components/parameters/WorldIdQuery'
        - $ref: '#/components/parameters/GroupIdQuery'
        - name: region
          in: query
          schema: { type: string, nullable: true }
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [opened_at, closed_at]
            default: opened_at
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: インスタンス一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstanceOut'

  /api/instances/{instance_id}:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstance
      tags: [instances]
      responses:
        '200':
          description: インスタンス詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceOut'
        '404':
          description: 見つからない
    delete:
      operationId: deleteInstance
      tags: [instances]
      responses:
        '204':
          description: 削除
        '404':
          description: 見つからない

  /api/instances/{instance_id}/presence:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstancePresence
      tags: [instances]
      parameters:
        - name: at
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: 在席プレイヤー
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionOut'

  /api/instances/{instance_id}/players:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstancePlayers
      tags: [instances]
      parameters:
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [internal_id, display_name, join_ts]
            default: internal_id
        - $ref: '#/components/parameters/OrderAscQuery'
      responses:
        '200':
          description: 在席プレイヤー一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationPlayerOut'

  /api/instances/{instance_id}/visitors:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstanceVisitors
      tags: [instances]
      parameters:
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [display_name, first_seen, last_seen, join_count, total_duration_seconds]
            default: last_seen
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: 訪問者一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VisitorOut'

  /api/instances/{instance_id}/stats:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstanceStats
      tags: [instances]
      description: インスタンス単位の集計サマリー(常時表示用)。
      responses:
        '200':
          description: 統計サマリー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceStatsOut'

  /api/instances/{instance_id}/discord-mentions:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstanceDiscordMentions
      tags: [instances]
      description: 在室中プレイヤーのうち Discord ID が登録されている人の ID 一覧。
      responses:
        '200':
          description: Discord メンション用 ID 一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordMentionsOut'

  /api/instances/{instance_id}/presence-timeline:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstancePresenceTimeline
      tags: [instances]
      parameters:
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
      responses:
        '200':
          description: 在席タイムライン
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimelinePoint'

  /api/instances/{instance_id}/events:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstanceEvents
      tags: [instances]
      parameters:
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: イベント一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventOut'

  /api/instances/{instance_id}/sessions:
    parameters:
      - $ref: '#/components/parameters/InstanceIdPath'
    get:
      operationId: getInstanceSessions
      tags: [instances]
      description: |
        セッション一覧。`start`/`end` を指定した場合は、セッション期間
        `[join_ts, leave_ts)` が `[start, end]` と重なるものを返す
        (leave_ts が NULL の在室中セッションは end の制約のみで判定)。
      parameters:
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [internal_id, display_name, join_ts, leave_ts, duration_seconds]
            default: join_ts
        - $ref: '#/components/parameters/OrderAscQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: セッション一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionOut'

  /api/players:
    get:
      operationId: listPlayers
      tags: [players]
      parameters:
        - name: name
          in: query
          schema: { type: string, nullable: true }
        - $ref: '#/components/parameters/OrderAscQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: プレイヤー一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerOut'

  /api/players/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      operationId: getPlayer
      tags: [players]
      description: プレイヤーの詳細情報 (プロフィール + 通算統計)。
      responses:
        '200':
          description: プレイヤー詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerDetailOut'
        '404':
          description: 見つからない

  /api/players/{user_id}/discord:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    put:
      operationId: setPlayerDiscord
      tags: [players]
      description: |
        プレイヤーの Discord ID を登録/更新する。
        `discord_id` に null または空文字を渡した場合は登録を削除する。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlayerDiscordIn' }
      responses:
        '204':
          description: 設定/削除完了
        '404':
          description: プレイヤーが見つからない

  /api/players/{user_id}/events:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      operationId: getPlayerEvents
      tags: [players]
      parameters:
        - name: instance_id
          in: query
          schema: { type: integer, nullable: true }
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - $ref: '#/components/parameters/OrderAscQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: プレイヤーイベント一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventOut'

  /api/players/{user_id}/sessions:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      operationId: getPlayerSessions
      tags: [players]
      parameters:
        - name: instance_id
          in: query
          schema: { type: integer, nullable: true }
        - $ref: '#/components/parameters/WorldIdQuery'
        - $ref: '#/components/parameters/GroupIdQuery'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - $ref: '#/components/parameters/OrderAscQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: プレイヤーセッション一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerSessionOut'

  /api/worlds:
    get:
      operationId: listWorlds
      tags: [worlds]
      parameters:
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/EndQuery'
        - $ref: '#/components/parameters/OrderDescQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: ワールド一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorldOut'

  /api/worlds/{world_id}:
    parameters:
      - name: world_id
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: renameWorld
      tags: [worlds]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorldRenameIn'
      responses:
        '204':
          description: 名前を更新
        '404':
          description: 見つからない
    delete:
      operationId: deleteWorld
      tags: [worlds]
      responses:
        '204':
          description: 削除
        '404':
          description: 見つからない

components:
  parameters:
    LocationIdPath:
      name: location_id
      in: path
      required: true
      schema: { type: string }
    InstanceIdPath:
      name: instance_id
      in: path
      required: true
      schema: { type: integer }
    UserIdPath:
      name: user_id
      in: path
      required: true
      schema: { type: string }
    WorldIdQuery:
      name: world_id
      in: query
      schema: { type: string, nullable: true }
    GroupIdQuery:
      name: group_id
      in: query
      schema: { type: string, nullable: true }
    StartQuery:
      name: start
      in: query
      schema: { type: string, format: date-time, nullable: true }
    EndQuery:
      name: end
      in: query
      schema: { type: string, format: date-time, nullable: true }
    OrderAscQuery:
      name: order
      in: query
      schema:
        allOf:
          - $ref: '#/components/schemas/Order'
        default: asc
    OrderDescQuery:
      name: order
      in: query
      schema:
        allOf:
          - $ref: '#/components/schemas/Order'
        default: desc
    LimitQuery:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, nullable: true }
    OffsetQuery:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }

  schemas:
    Order:
      type: string
      enum: [asc, desc]

    EventOut:
      type: object
      required: [id, event_type, instance_id, world_id, user_id, display_name, timestamp]
      properties:
        id: { type: integer }
        event_type:
          type: string
          enum: [join, leave]
        instance_id: { type: integer }
        world_id: { type: string }
        user_id: { type: string }
        display_name: { type: string }
        timestamp: { type: string, format: date-time }

    PlayerEvent:
      type: object
      required: [event, location_id, name, user_id, internal_id, timestamp]
      properties:
        event:
          type: string
          enum: [join, leave]
        location_id: { type: string }
        name: { type: string }
        user_id: { type: string }
        internal_id: { type: integer }
        timestamp: { type: string, format: date-time }
        estimated:
          type: boolean
          default: false
          description: |
            true の場合、timestamp は入室時刻ではなく初観測時刻(真の入室はそれ以前)。
            エージェントが途中参加した際、既に居たプレイヤーの Join に付与される。

    GroupOut:
      type: object
      required: [group_id, created_at, updated_at]
      properties:
        group_id: { type: string }
        name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GroupRenameIn:
      type: object
      required: [name]
      properties:
        name: { type: string }

    WorldOut:
      type: object
      required: [world_id, created_at, updated_at, session_count]
      properties:
        world_id: { type: string }
        name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_seen: { type: string, format: date-time, nullable: true }
        session_count: { type: integer }

    WorldRenameIn:
      type: object
      required: [name]
      properties:
        name: { type: string }

    PlayerOut:
      type: object
      required: [user_id, display_name, created_at, updated_at]
      properties:
        user_id: { type: string }
        display_name: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PlayerDetailOut:
      type: object
      description: |
        プレイヤーの詳細情報。プロフィール + 通算統計を返す。
      required:
        [user_id, display_name, created_at, updated_at,
         total_visits, total_duration_seconds, in_room]
      properties:
        user_id: { type: string }
        display_name: { type: string }
        discord_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        total_visits: { type: integer, description: 通算訪問回数 }
        total_duration_seconds: { type: integer, description: 通算滞在秒数 }
        first_seen: { type: string, format: date-time, nullable: true }
        last_seen: { type: string, format: date-time, nullable: true }
        in_room: { type: boolean, description: 現在 leave_ts なしのセッションがあるか }

    PlayerDiscordIn:
      type: object
      required: [discord_id]
      properties:
        discord_id:
          type: string
          nullable: true
          description: null または空文字を渡すと登録を削除する

    PlayerSessionOut:
      type: object
      required: [id, instance_id, world_id, join_ts, is_estimated_join, is_estimated_leave]
      properties:
        id: { type: integer }
        instance_id: { type: integer }
        world_id: { type: string }
        join_ts: { type: string, format: date-time }
        leave_ts: { type: string, format: date-time, nullable: true }
        duration_seconds: { type: integer, nullable: true }
        is_estimated_join: { type: boolean }
        is_estimated_leave: { type: boolean }

    CloseLocationIn:
      type: object
      required: [at]
      properties:
        at: { type: string, format: date-time }
        user_id: { type: string, nullable: true }

    ObservedPlayer:
      type: object
      required: [user_id, internal_id]
      properties:
        user_id: { type: string }
        internal_id: { type: integer }

    CheckinIn:
      type: object
      required: [at, self, players]
      properties:
        at: { type: string, format: date-time }
        self:
          $ref: '#/components/schemas/ObservedPlayer'
        players:
          type: array
          items: { $ref: '#/components/schemas/ObservedPlayer' }

    CheckinOut:
      type: object
      required: [resumed, resumed_user_ids]
      properties:
        resumed: { type: boolean }
        resumed_user_ids:
          type: array
          items: { type: string }

    InstanceOut:
      type: object
      required: [id, location_id, world_id, opened_at, user_count]
      properties:
        id: { type: integer }
        location_id: { type: string }
        world_id: { type: string }
        world_name: { type: string, nullable: true }
        instance_id: { type: string, nullable: true }
        group_id: { type: string, nullable: true }
        group_name: { type: string, nullable: true }
        group_access_type: { type: string, nullable: true }
        region: { type: string, nullable: true }
        friends: { type: string, nullable: true }
        hidden: { type: string, nullable: true }
        private: { type: string, nullable: true }
        opened_at: { type: string, format: date-time }

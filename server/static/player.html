<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セッション履歴</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }

    #day-list { font-size: 13px; }

    .day-row {
      display: flex;
      align-items: center;
      height: 30px;
      border-bottom: 1px solid #f0f0f0;
    }
    .day-row:last-child { border-bottom: none; }

    .day-label {
      flex: 0 0 84px;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      padding-right: 8px;
      text-align: right;
      white-space: nowrap;
      user-select: none;
    }

    .day-bar {
      flex: 1;
      position: relative;
      height: 18px;
      border-radius: 3px;
      background:
        linear-gradient(#c8cdd2, #c8cdd2) no-repeat 25% / 1px 100%,
        linear-gradient(#c8cdd2, #c8cdd2) no-repeat 50% / 1px 100%,
        linear-gradient(#c8cdd2, #c8cdd2) no-repeat 75% / 1px 100%,
        #dee2e6;
    }

    .seg {
      position: absolute;
      top: 2px;
      bottom: 2px;
      background: rgba(13, 110, 253, 0.6);
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.1s;
      min-width: 2px;
    }
    .seg:hover { background: rgba(13, 110, 253, 0.95); }

    .hour-header {
      display: flex;
      align-items: center;
      height: 20px;
      margin-bottom: 2px;
    }
    .hour-header-spacer { flex: 0 0 84px; }
    .hour-scale {
      flex: 1;
      position: relative;
      font-size: 10px;
      color: #6c757d;
    }
    .hour-scale span {
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .hour-scale span:first-child { transform: none; }
    .hour-scale span:last-child  { transform: translateX(-100%); }

    #tooltip {
      position: fixed;
      background: rgba(30, 30, 30, 0.88);
      color: #fff;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      display: none;
      z-index: 9999;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand mb-0 h1 text-decoration-none" href="/">VRChat Join Manager</a>
  </nav>

  <div class="container-fluid py-3" style="max-width:960px">
    <div class="card">
      <div class="card-header d-flex align-items-center gap-3 flex-wrap">
        <h6 class="mb-0 me-auto" id="player-heading">読み込み中...</h6>
        <div class="d-flex align-items-center gap-2">
          <button id="prev-btn" class="btn btn-sm btn-outline-secondary">&#8249;</button>
          <span id="month-label" class="fw-semibold" style="min-width:6em;text-align:center"></span>
          <button id="next-btn" class="btn btn-sm btn-outline-secondary">&#8250;</button>
        </div>
      </div>
      <div class="card-body py-2 px-3">
        <!-- 時刻スケールヘッダー -->
        <div class="hour-header">
          <div class="hour-header-spacer"></div>
          <div class="hour-scale">
            <span style="left:0%">0:00</span>
            <span style="left:25%">6:00</span>
            <span style="left:50%">12:00</span>
            <span style="left:75%">18:00</span>
            <span style="left:100%">24:00</span>
          </div>
        </div>
        <!-- 日付行 -->
        <div id="day-list">
          <div class="text-center text-muted py-4">読み込み中...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="/player.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インスタンス比較 — VRChat Join Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    #chart-wrapper { position: relative; height: 420px; }
    #diff-chart-wrapper { position: relative; height: 220px; }
    .inst-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
  </style>
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">VRChat Join Manager — インスタンス比較</span>
    <a href="/" class="btn btn-sm btn-outline-light">← 一覧に戻る</a>
  </nav>

  <div class="container-fluid py-3">

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <!-- インスタンス情報カード -->
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <div class="card border-primary">
          <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2">
              <span style="flex-shrink:0;width:12px;height:12px;border-radius:2px;background:#0d6efd;display:inline-block"></span>
              <div class="overflow-hidden">
                <div class="fw-semibold inst-label" id="inst1-world"></div>
                <small class="text-muted inst-label" id="inst1-location"></small>
                <div class="small mt-1" id="inst1-range"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-danger">
          <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2">
              <span style="flex-shrink:0;width:12px;height:12px;border-radius:2px;background:#dc3545;display:inline-block"></span>
              <div class="overflow-hidden">
                <div class="fw-semibold inst-label" id="inst2-world"></div>
                <small class="text-muted inst-label" id="inst2-location"></small>
                <div class="small mt-1" id="inst2-range"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 人数推移グラフ -->
    <div class="card mb-3">
      <div class="card-body">
        <div id="chart-wrapper">
          <canvas id="compare-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- 差分グラフ -->
    <div class="card">
      <div class="card-header py-2 small fw-semibold text-muted">
        人数差分（<span class="text-primary">青</span> − <span class="text-danger">赤</span>）
      </div>
      <div class="card-body">
        <div id="diff-chart-wrapper">
          <canvas id="diff-chart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const id1 = params.get('id1');
    const id2 = params.get('id2');

    if (!id1 || !id2) {
      const el = document.getElementById('error-msg');
      el.textContent = 'URLパラメータ id1, id2 が必要です。';
      el.classList.remove('d-none');
    } else {
      loadCompare();
    }

    async function loadCompare() {
      try {
        const [inst1, inst2, tl1, tl2] = await Promise.all([
          fetch(`/api/instances/${id1}`).then(r => r.json()),
          fetch(`/api/instances/${id2}`).then(r => r.json()),
          fetch(`/api/instances/${id1}/presence-timeline`).then(r => r.json()),
          fetch(`/api/instances/${id2}/presence-timeline`).then(r => r.json()),
        ]);

        renderInfo('inst1', inst1);
        renderInfo('inst2', inst2);

        const pts1 = buildPoints(tl1, inst1);
        const pts2 = buildPoints(tl2, inst2);
        renderCompareChart(pts1, tl1.length, pts2, tl2.length);
        renderDiffChart(pts1, pts2);
      } catch (e) {
        const el = document.getElementById('error-msg');
        el.textContent = 'データの読み込みに失敗しました: ' + e.message;
        el.classList.remove('d-none');
      }
    }

    function renderInfo(prefix, inst) {
      document.getElementById(prefix + '-world').textContent = inst.world_id ?? '—';
      document.getElementById(prefix + '-location').textContent = inst.location_id ?? '';
      const openedAt = fmtDate(inst.opened_at);
      const closedAt = inst.closed_at ? fmtDate(inst.closed_at) : '進行中';
      document.getElementById(prefix + '-range').innerHTML = inst.closed_at
        ? `<span class="badge bg-secondary">${openedAt} 〜 ${closedAt}</span>`
        : `<span class="badge bg-success">${openedAt} 〜 ${closedAt}</span>`;
    }

    function buildPoints(data, inst) {
      const pts = data.map(d => ({ x: new Date(d.timestamp), y: d.count }));
      if (!inst.closed_at && pts.length > 0) {
        pts.push({ x: new Date(), y: pts[pts.length - 1].y });
      }
      return pts;
    }

    // ステップ補間: 時刻 t における pts の値を返す
    function stepValue(pts, t) {
      let val = 0;
      for (const p of pts) {
        if (p.x.getTime() <= t) val = p.y;
        else break;
      }
      return val;
    }

    function buildDiffPoints(pts1, pts2) {
      const times = [...new Set([
        ...pts1.map(p => p.x.getTime()),
        ...pts2.map(p => p.x.getTime()),
      ])].sort((a, b) => a - b);

      return times.map(t => ({
        x: new Date(t),
        y: stepValue(pts1, t) - stepValue(pts2, t),
      }));
    }

    const COMMON_X_OPTIONS = {
      type: 'time',
      time: { displayFormats: { minute: 'HH:mm', hour: 'MM/dd HH:mm' } },
    };

    function renderCompareChart(pts1, rawLen1, pts2, rawLen2) {
      const ctx = document.getElementById('compare-chart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [
            {
              label: '青',
              data: pts1,
              borderColor: 'rgb(13, 110, 253)',
              backgroundColor: 'rgba(13, 110, 253, 0.08)',
              stepped: true,
              fill: true,
              pointRadius: rawLen1 < 200 ? 3 : 0,
              borderWidth: 2,
            },
            {
              label: '赤',
              data: pts2,
              borderColor: 'rgb(220, 53, 69)',
              backgroundColor: 'rgba(220, 53, 69, 0.08)',
              stepped: true,
              fill: true,
              pointRadius: rawLen2 < 200 ? 3 : 0,
              borderWidth: 2,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: COMMON_X_OPTIONS,
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 },
              title: { display: true, text: '人数' }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: items => new Date(items[0].parsed.x).toLocaleString('ja-JP'),
                label: items => {
                  const color = items.datasetIndex === 0 ? '青' : '赤';
                  return ` ${color}: ${items.parsed.y} 人`;
                }
              }
            }
          }
        }
      });
    }

    function renderDiffChart(pts1, pts2) {
      const ctx = document.getElementById('diff-chart').getContext('2d');
      const diffPts = buildDiffPoints(pts1, pts2);
      // 正値（青が多い）と負値（赤が多い）を別データセットに分割
      const posPts = diffPts.map(p => ({ x: p.x, y: Math.max(0, p.y) }));
      const negPts = diffPts.map(p => ({ x: p.x, y: Math.min(0, p.y) }));
      const r = diffPts.length < 200 ? 2 : 0;

      new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [
            {
              data: posPts,
              borderColor: 'rgb(13, 110, 253)',
              backgroundColor: 'rgba(13, 110, 253, 0.18)',
              stepped: true,
              fill: 'origin',
              pointRadius: r,
              borderWidth: 1.5,
            },
            {
              data: negPts,
              borderColor: 'rgb(220, 53, 69)',
              backgroundColor: 'rgba(220, 53, 69, 0.18)',
              stepped: true,
              fill: 'origin',
              pointRadius: r,
              borderWidth: 1.5,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: COMMON_X_OPTIONS,
            y: {
              ticks: { stepSize: 1 },
              title: { display: true, text: '差分 (人)' }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              filter: item => item.datasetIndex === 0,
              callbacks: {
                title: items => new Date(items[0].parsed.x).toLocaleString('ja-JP'),
                label: items => {
                  const v = diffPts[items.dataIndex].y;
                  if (v > 0) return ` 青が ${v} 人多い`;
                  if (v < 0) return ` 赤が ${-v} 人多い`;
                  return ' 同数';
                }
              }
            }
          }
        }
      });
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleString('ja-JP', {
        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      });
    }
  </script>

</body>
</html>

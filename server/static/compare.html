<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インスタンス比較 — VRChat Join Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/compare.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">VRChat Join Manager — インスタンス比較</span>
    <a href="/" class="btn btn-sm btn-outline-light">← 一覧に戻る</a>
  </nav>

  <div class="container-fluid py-3">

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <!-- インスタンス情報カード -->
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <a id="inst1-link" href="/" class="card border-primary text-decoration-none text-reset d-block">
          <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2">
              <span
                style="flex-shrink:0;width:12px;height:12px;border-radius:2px;background:#0d6efd;display:inline-block"></span>
              <div class="overflow-hidden">
                <div class="fw-semibold inst-label" id="inst1-world"></div>
                <small class="text-muted inst-label" id="inst1-location"></small>
                <div class="small mt-1" id="inst1-range"></div>
              </div>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a id="inst2-link" href="/" class="card border-danger text-decoration-none text-reset d-block">
          <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2">
              <span
                style="flex-shrink:0;width:12px;height:12px;border-radius:2px;background:#dc3545;display:inline-block"></span>
              <div class="overflow-hidden">
                <div class="fw-semibold inst-label" id="inst2-world"></div>
                <small class="text-muted inst-label" id="inst2-location"></small>
                <div class="small mt-1" id="inst2-range"></div>
              </div>
            </div>
          </div>
        </a>
      </div>
    </div>

    <!-- 人数推移グラフ -->
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-end mb-2">
          <button id="compare-reset-zoom-btn" class="btn btn-outline-secondary btn-sm">ズームリセット</button>
        </div>
        <div id="chart-wrapper">
          <canvas id="compare-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- 差分グラフ -->
    <div class="card mb-3">
      <div class="card-header py-2 small fw-semibold text-muted">
        人数差分（<span class="text-primary">青</span> − <span class="text-danger">赤</span>）
      </div>
      <div class="card-body">
        <div id="diff-chart-wrapper">
          <canvas id="diff-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- ルール違反一覧 -->
    <div class="card">
      <div class="card-header py-2 small fw-semibold text-muted d-flex justify-content-between align-items-center">
        <span>ルール違反一覧</span>
        <div class="d-flex align-items-center gap-2">
          <label class="mb-0 fw-normal" for="grace-select">猶予</label>
          <select id="grace-select" class="form-select form-select-sm" style="width:auto">
            <option value="5">5分</option>
            <option value="10">10分</option>
            <option value="15" selected>15分</option>
            <option value="20">20分</option>
            <option value="25">25分</option>
            <option value="30">30分</option>
          </select>
          <span class="badge bg-danger" id="violation-count">0</span>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0" id="violations-table">
            <thead class="table-light">
              <tr>
                <th data-col="display_name" class="v-sort-col">ユーザー名<span class="v-sort-icon text-muted"> ⇅</span></th>
                <th data-col="join_ts" class="v-sort-col">違反時刻<span class="v-sort-icon text-muted"> ⇅</span></th>
                <th data-col="instance" class="v-sort-col">参加先<span class="v-sort-icon text-muted"> ⇅</span></th>
                <th data-col="diff" class="v-sort-col">人数差<span class="v-sort-icon text-muted"> ⇅</span></th>
                <th data-col="duration_seconds" class="v-sort-col">滞在時間<span class="v-sort-icon text-muted"> ⇅</span></th>
              </tr>
            </thead>
            <tbody id="violations-tbody"></tbody>
          </table>
        </div>
        <div id="violations-empty" class="text-center text-muted py-3 d-none small">違反なし</div>
      </div>
    </div>

  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/compare.js"></script>

</body>

</html>

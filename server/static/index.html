<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRChat Join Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    html,
    body {
      height: 100%;
    }

    #sidebar {
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    #chart-wrapper {
      position: relative;
      height: 420px;
    }

    .location-item small {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    #event-table-wrapper {
      max-height: 520px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">VRChat Join Manager</span>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- サイドバー: ロケーション一覧 -->
      <div class="col-md-4 col-lg-3 p-0 border-end bg-light" id="sidebar">
        <div class="p-3 border-bottom">
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label small mb-1">開始</label>
              <input type="datetime-local" id="loc-start" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label small mb-1">終了</label>
              <input type="datetime-local" id="loc-end" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <button id="loc-search-btn" class="btn btn-secondary btn-sm w-100">絞り込み</button>
            </div>
          </div>
        </div>
        <div id="location-list" class="list-group list-group-flush">
          <div class="list-group-item text-muted small">読み込み中...</div>
        </div>
      </div>

      <!-- メイン -->
      <div class="col-md-8 col-lg-9 p-3">
        <div class="card">

          <!-- ロケーション名 + タブ -->
          <div class="card-header">
            <div class="mb-2">
              <span id="selected-label" class="text-muted small">ロケーションを選択してください</span>
            </div>
            <ul class="nav nav-tabs card-header-tabs" id="main-tabs">
              <li class="nav-item">
                <button class="nav-link active" data-tab="timeline">人数推移</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-tab="events">入退場ログ</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-tab="sessions">セッション一覧</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-tab="players">在室中</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-tab="visitors">訪れた人</button>
              </li>
            </ul>
          </div>

          <div class="card-body">

            <!-- 共通プレースホルダー -->
            <div id="main-placeholder" class="text-center text-muted py-5">
              左のリストからロケーションを選択してください
            </div>

            <!-- ── 人数推移タブ ── -->
            <div id="tab-timeline" class="d-none">
              <div class="d-flex align-items-center gap-2 flex-wrap mb-3">
                <input type="datetime-local" id="tl-start" class="form-control form-control-sm" style="width:auto">
                <span class="text-muted small">〜</span>
                <input type="datetime-local" id="tl-end" class="form-control form-control-sm" style="width:auto">
                <button id="tl-update-btn" class="btn btn-primary btn-sm">更新</button>
              </div>
              <div id="chart-wrapper">
                <canvas id="timeline-chart"></canvas>
              </div>
            </div>

            <!-- ── セッション一覧タブ ── -->
            <div id="tab-sessions" class="d-none">
              <div class="d-flex align-items-center gap-2 flex-wrap mb-3">
                <input type="datetime-local" id="ss-start" class="form-control form-control-sm" style="width:auto">
                <span class="text-muted small">〜</span>
                <input type="datetime-local" id="ss-end" class="form-control form-control-sm" style="width:auto">
                <button id="ss-update-btn" class="btn btn-primary btn-sm">更新</button>
              </div>
              <div id="session-table-wrapper" style="max-height:520px;overflow-y:auto">
                <table class="table table-sm table-hover mb-0">
                  <thead class="table-light sticky-top" id="session-thead">
                    <tr>
                      <th data-sort="display_name" style="cursor:pointer">名前<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="join_ts" style="width:140px;cursor:pointer">入室<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="leave_ts" style="width:140px;cursor:pointer">退室<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="duration_seconds" style="width:90px;cursor:pointer" class="text-end">滞在時間<span class="sort-indicator text-muted"></span></th>
                    </tr>
                  </thead>
                  <tbody id="session-tbody"></tbody>
                </table>
              </div>
            </div>

            <!-- ── 在室中タブ ── -->
            <div id="tab-players" class="d-none">
              <div class="mb-3">
                <button id="pl-reload-btn" class="btn btn-primary btn-sm">更新</button>
              </div>
              <table class="table table-sm table-hover mb-0">
                <thead class="table-light" id="player-thead">
                  <tr>
                    <th data-sort="internal_id" style="width:60px;cursor:pointer" class="text-end">ID<span class="sort-indicator text-muted"></span></th>
                    <th data-sort="display_name" style="cursor:pointer">名前<span class="sort-indicator text-muted"></span></th>
                    <th data-sort="join_ts" style="width:140px;cursor:pointer">入室日時<span class="sort-indicator text-muted"></span></th>
                  </tr>
                </thead>
                <tbody id="player-tbody"></tbody>
              </table>
            </div>

            <!-- ── 訪れた人タブ ── -->
            <div id="tab-visitors" class="d-none">
              <div class="d-flex align-items-center gap-2 flex-wrap mb-3">
                <button id="vi-reload-btn" class="btn btn-primary btn-sm">更新</button>
                <span id="vi-count" class="text-muted small"></span>
              </div>
              <div style="max-height:520px;overflow-y:auto">
                <table class="table table-sm table-hover mb-0">
                  <thead class="table-light sticky-top">
                    <tr id="visitor-thead">
                      <th data-sort="display_name" style="cursor:pointer">名前<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="first_seen" style="width:140px;cursor:pointer">初訪問<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="last_seen" style="width:140px;cursor:pointer">最終訪問<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="join_count" style="width:80px;cursor:pointer" class="text-end">訪問回数<span class="sort-indicator text-muted"></span></th>
                      <th data-sort="total_duration_seconds" style="width:100px;cursor:pointer" class="text-end">合計滞在<span class="sort-indicator text-muted"></span></th>
                    </tr>
                  </thead>
                  <tbody id="visitor-tbody"></tbody>
                </table>
              </div>
            </div>

            <!-- ── セッションモーダル ── -->
            <div class="modal fade" id="session-modal" tabindex="-1">
              <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="session-modal-title"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body p-0">
                    <table class="table table-sm table-hover mb-0">
                      <thead class="table-light sticky-top">
                        <tr>
                          <th style="width:140px">入室</th>
                          <th style="width:140px">退室</th>
                          <th style="width:140px" class="text-end">滞在時間</th>
                        </tr>
                      </thead>
                      <tbody id="session-modal-tbody"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

            <!-- ── 入退場ログタブ ── -->
            <div id="tab-events" class="d-none">
              <div class="d-flex align-items-center gap-2 flex-wrap mb-3">
                <input type="datetime-local" id="ev-start" class="form-control form-control-sm" style="width:auto">
                <span class="text-muted small">〜</span>
                <input type="datetime-local" id="ev-end" class="form-control form-control-sm" style="width:auto">
                <button id="ev-update-btn" class="btn btn-primary btn-sm">更新</button>
              </div>
              <div id="event-table-wrapper">
                <table class="table table-sm table-hover mb-0">
                  <thead class="table-light sticky-top" id="event-thead">
                    <tr>
                      <th id="ev-ts-header" style="width:150px;cursor:pointer">日時<span id="ev-sort-indicator" class="text-muted"></span></th>
                      <th style="width:150px">種別</th>
                      <th>名前</th>
                    </tr>
                  </thead>
                  <tbody id="event-tbody"></tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
